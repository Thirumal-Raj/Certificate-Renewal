app:
  name: Certificate Renewal Agent
  version: 1.0.0
  cert_expiry_warn_days: 999

gmail:
  email: autopilot.ai26@gmail.com
  imap_host: imap.gmail.com
  imap_port: 993
  search:
    folder: INBOX
    subject_filter: "certificate"
    unread_only: false
    max_emails: 10
  attachments:
    download_dir: downloads/certs
    allowed_extensions: ["crt", "pem", "cer", "p12", "pfx", "der"]
    max_size_mb: 25

as2:
  # mode: local    → no server needed, stores certs in as2_local_store/ (default)
  # mode: openas2  → connects to a running OpenAS2 server (requires Docker or install)
  mode: openas2
  partner:
    name: "OpenAS2A"
    as2_id: "OpenAS2A"
    url: "http://localhost:10080/as2/HttpReceiver"
  # --- OpenAS2 server settings (only used when mode: openas2) ---
  host: localhost
  port: 10080
  api_enabled: true
  api_base_url: "http://localhost:8080/api"
  api_username: "userID"
  api_password: "pWd"
  config_dir: "/Users/thirumalraj/downloads/OpenAS2Server-4.8.0/config"
  partners_file: "partnerships.xml"
  keystore_path: "/Users/thirumalraj/downloads/OpenAS2Server-4.8.0/config/as2_certs.p12"
  keystore_password: "testas2"

# Local cert store (used when as2.mode: local)
local_cert_store:
  store_dir: "as2_local_store"   # certs land here, registry saved as JSON

cert_renewal:
  renew_before_days: 30
  output_dir: downloads/renewed
